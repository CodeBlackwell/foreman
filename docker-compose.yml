services:
  neo4j:
    image: neo4j:5-community
    container_name: foreman-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
    mem_limit: 768m
    volumes:
      - neo4j_data:/data
    networks:
      - internal

  api:
    build: .
    container_name: foreman-api
    restart: unless-stopped
    command: uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8001
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
    depends_on:
      - neo4j
    networks:
      - internal

  ui:
    build: .
    container_name: foreman-ui
    restart: unless-stopped
    command: uv run streamlit run scripts/demo_ui.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_URL: http://api:8001
    depends_on:
      - api
    networks:
      - internal
      - web

volumes:
  neo4j_data:

networks:
  internal:
  web:
    external: true
